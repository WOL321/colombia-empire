<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Colombian Empire | DiplomaticaMC</title>
    <style>
        :root {
            --bg-main: #05070a; --bg-surface: #0b0e14; --bg-card: #111622;
            --text-primary: #f1f5f9; --text-muted: #8898aa;
            --imperial-gold: #ffc837; --colombia-red: #dc2626;
            --font-heading: 'Cinzel', serif; --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        /* --- BASIC SETUP --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-main); color: var(--text-primary); font-family: var(--font-body); line-height: 1.6; }
        
        /* --- ANIMATION SYSTEM --- */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- YOUR LAYOUT STYLES --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .section { padding: 6rem 0; }
        .bg-alt { background-color: var(--bg-surface); }
        .grid { display: grid; gap: 2rem; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        
        /* ... Add your specific Navbar/Button/Card styles here ... */
    </style>
</head>
<body>

    <section id="domain" class="section container reveal">
        <h2>Absolute Regional Control</h2>
    </section>

    <section id="towns" class="section container">
        <div class="grid grid-3">
            <div class="town-card reveal">...</div>
            <div class="town-card reveal">...</div>
        </div>
    </section>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        // This picks up everything with the "reveal" class
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
