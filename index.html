    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Colombian Empire | DiplomaticaMC</title>
    <style>
        :root {
            --bg-main: #05070a; --bg-surface: #0b0e14; --bg-card: #111622;
            --text-primary: #f1f5f9; --text-muted: #8898aa;
            --imperial-gold: #ffc837; --colombia-red: #dc2626;
            --font-heading: 'Cinzel', serif; --font-body: 'Plus Jakarta Sans', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-main); color: var(--text-primary); font-family: var(--font-body); line-height: 1.6; }
        
        /* ANIMATION SYSTEM - SAFE & STABLE */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* LAYOUT */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .section { padding: 6rem 0; }
        .bg-alt { background-color: var(--bg-surface); }
        .grid { display: grid; gap: 2rem; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }

        /* CARDS & INTERACTION */
        .town-card, .gov-pill { transition: transform 0.3s ease, border-color 0.3s ease; }
        .town-card:hover, .gov-pill:hover { transform: translateY(-8px); border-color: var(--imperial-gold); }
        
        /* ADD YOUR OTHER EXISTING CSS HERE... */
    </style>
</head>
<body>

    <!-- HERO SECTION -->
    <section class="hero reveal">
        <h1>THE COLOMBIAN EMPIRE</h1>
    </section>

    <!-- TERRITORY SECTION -->
    <section id="domain" class="section container reveal">
        <h2>Absolute Regional Control</h2>
    </section>

    <!-- CABINET SECTION -->
    <section id="cabinet" class="section bg-alt">
        <div class="container">
            <div class="grid grid-3">
                <div class="gov-pill reveal"><h4>🏛️ Ministry of Interior</h4></div>
                <div class="gov-pill reveal"><h4>💰 Ministry of Finance</h4></div>
                <div class="gov-pill reveal"><h4>⚖️ Ministry of Justice</h4></div>
            </div>
        </div>
    </section>

    <script>
        // THE BRAIN: Triggers animation when elements scroll into view
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        // Apply to everything with the "reveal" class
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
